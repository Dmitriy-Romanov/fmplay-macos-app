name: Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    name: macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        run: cargo check --locked

      - name: Build app bundle
        run: scripts/build_app.sh

      - name: Package app
        run: |
          cd target/release
          ditto -c -k --sequesterRsrc --keepParent "FMPLAY Radio.app" "FMPLAY Radio-macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FMPLAY Radio-macOS
          path: target/release/FMPLAY Radio-macOS.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/FMPLAY Radio-macOS.zip
