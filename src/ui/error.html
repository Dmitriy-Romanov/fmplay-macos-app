<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FMPLAY Radio</title>
<style>
body {
margin: 0;
min-height: 100vh;
display: grid;
place-items: center;
background: #111312;
color: #f0f4ef;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.error {
max-width: 620px;
padding: 24px;
}
.title {
font-size: 22px;
font-weight: 750;
}
.message {
margin-top: 12px;
color: #f6b7b7;
white-space: pre-wrap;
}
</style>
</head>
<body>
<div class="error">
<div class="title">Не удалось загрузить каталог FMPLAY</div>
<div class="message">{message}</div>
</div>
</body>
</html>
